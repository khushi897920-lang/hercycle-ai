name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Provide placeholder env for CI when secrets are missing
        shell: bash
        run: |
          set -euo pipefail
          echo "Providing CI placeholders for missing secrets (safe for forked PRs)"

          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
            echo "NEXT_PUBLIC_SUPABASE_URL=https://ci-placeholder.supabase.co" >> $GITHUB_ENV
          fi

          if [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}" ]; then
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=ci-anon-key" >> $GITHUB_ENV
          fi

          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY=ci-service-role" >> $GITHUB_ENV
          fi

          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=ci-clerk-pub" >> $GITHUB_ENV
          fi

          if [ -z "${CLERK_SECRET_KEY:-}" ]; then
            echo "CLERK_SECRET_KEY=ci-clerk-secret" >> $GITHUB_ENV
          fi

          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "GEMINI_API_KEY=ci-gemini" >> $GITHUB_ENV
          fi

          if [ -z "${GROQ_API_KEY:-}" ]; then
            echo "GROQ_API_KEY=ci-groq" >> $GITHUB_ENV
          fi

      - name: Run build
        run: npm run build
